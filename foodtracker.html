<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AyuCare - Food Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ayu-theme.css" />
</head>
<body class="ay-body">
  <div class="ay-bg-blur" aria-hidden="true"></div>
  <div class="ay-wrap">
    <header class="ay-topbar ay-glass">
      <div class="ay-brand">AyuCare</div>
      <nav class="ay-nav">
        <a href="index.html">Home</a>
        <a href="food.html">Recommendations</a>
        <a href="foodtracker.html">Diet Tracker</a>
      </nav>
    </header>

    <section class="ay-hero ay-glass ay-reveal">
      <div>
        <h1>Food and Diet Tracker</h1>
        <p class="ay-sub">Track daily meals and hydration according to your wellness rhythm.</p>
      </div>
      <div class="ay-ring ay-spin">
        <img src="AmlaCandy.PNG" alt="Amla" />
        <img src="Chyawa.PNG" alt="Chyawanprash" />
        <img src="TulsiT.PNG" alt="Tulsi tea" />
        <img src="GingerT.PNG" alt="Ginger tea" />
        <img src="Coconut.jpeg" alt="Coconut" />
        <div class="ay-ring-inner">Diet<br />Flow</div>
      </div>
    </section>

    <main class="ay-content">
      <section class="ay-panel ay-glass ay-reveal" style="max-width:760px;margin:0 auto;">
        <form id="foodForm" onsubmit="event.preventDefault(); saveEntry();">
          <label for="logDate" style="display:block;font-weight:700;margin-bottom:0.3rem;">Select Date:</label>
          <input type="date" id="logDate" required class="ay-input" />

          <label for="breakfast" style="display:block;font-weight:700;margin-top:0.7rem;margin-bottom:0.3rem;">Breakfast:</label>
          <input type="text" id="breakfast" class="ay-input" />

          <label for="lunch" style="display:block;font-weight:700;margin-top:0.7rem;margin-bottom:0.3rem;">Lunch:</label>
          <input type="text" id="lunch" class="ay-input" />

          <label for="dinner" style="display:block;font-weight:700;margin-top:0.7rem;margin-bottom:0.3rem;">Dinner:</label>
          <input type="text" id="dinner" class="ay-input" />

          <label for="waterIntake" style="display:block;font-weight:700;margin-top:0.7rem;margin-bottom:0.3rem;">Water Intake (glasses):</label>
          <input type="number" id="waterIntake" class="ay-input" />

          <div style="display:flex;gap:0.6rem;flex-wrap:wrap;margin-top:0.9rem;">
            <button type="submit" class="ay-btn">Save Entry</button>
            <button onclick="syncWithCalendar()" type="button" class="ay-btn alt">Sync to Calendar</button>
            <button onclick="viewLog()" type="button" class="ay-btn alt">View Full Log</button>
          </div>
        </form>
      </section>

      <div id="logDisplay" class="ay-panel ay-glass ay-reveal" style="display:none;max-width:760px;margin:1rem auto 0;"></div>
    </main>
  </div>

  <script src="ayu-theme.js"></script>
  <script src="foodtracker.js"></script>
</body>
</html>
