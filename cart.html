<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart - AyuCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ayu-theme.css" />
</head>
<body class="ay-body">
  <div class="ay-bg-blur" aria-hidden="true"></div>
  <div class="ay-wrap">
    <header class="ay-topbar ay-glass">
      <div class="ay-brand">AyuCare</div>
      <nav class="ay-nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart</a>
      </nav>
    </header>

    <section class="ay-hero ay-glass ay-reveal" style="grid-template-columns:1fr;">
      <div>
        <h1>Your Ayurvedic Cart</h1>
        <p class="ay-sub">Review items before secure checkout.</p>
      </div>
    </section>

    <main class="ay-content ay-reveal">
      <section class="ay-panel ay-glass">
        <div id="cartItems" style="display:grid;gap:0.8rem;margin-bottom:1rem;"></div>

        <div style="text-align:right;font-size:1.15rem;font-weight:700;margin-bottom:0.9rem;">
          Total: ₹<span id="totalPrice">0</span>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:0.7rem;flex-wrap:wrap;">
          <a href="shop.html" class="ay-btn alt" style="text-decoration:none;">Continue Shopping</a>
          <button id="checkoutBtn" class="ay-btn">Checkout</button>
        </div>
      </section>
    </main>
  </div>

  <script src="ayu-theme.js"></script>
  <script src="cart.js"></script>
</body>
</html>
