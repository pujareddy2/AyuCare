<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga Video Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ayu-theme.css" />
</head>
<body class="ay-body">
  <div class="ay-bg-blur" aria-hidden="true"></div>
  <div class="ay-wrap">
    <header class="ay-topbar ay-glass">
      <div class="ay-brand">AyuCare</div>
      <nav class="ay-nav">
        <a href="index.html">Home</a>
        <a href="meditation.html">Meditation</a>
        <a href="yoga.html">Yoga</a>
        <a href="exercise.html">Exercise</a>
      </nav>
    </header>

    <section class="ay-hero ay-glass ay-reveal">
      <div>
        <h1>Yoga Video Recommender</h1>
        <p class="ay-sub">Find routines by time of day, mood, and wellness goal.</p>
      </div>
      <div class="ay-ring ay-spin">
        <img src="Brahmi.jpeg" alt="Brahmi" />
        <img src="Ashwagandha.jpeg" alt="Ashwagandha" />
        <img src="TulsiP.PNG" alt="Tulsi" />
        <img src="AmlaP.PNG" alt="Amla" />
        <img src="GingerP.PNG" alt="Ginger" />
        <div class="ay-ring-inner">Yoga<br />Flow</div>
      </div>
    </section>

    <main class="ay-content">
      <section class="ay-panel ay-glass ay-reveal">
        <form id="recommendationForm">
          <div class="ay-grid-3">
            <div>
              <label for="timeOfDay" style="display:block;font-weight:700;margin-bottom:0.3rem;">Time of Day</label>
              <select id="timeOfDay" class="ay-select">
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
                <option value="any">Any</option>
              </select>
            </div>

            <div>
              <label for="mood" style="display:block;font-weight:700;margin-bottom:0.3rem;">Your Mood</label>
              <select id="mood" class="ay-select">
                <option value="tired">Tired</option>
                <option value="okay">Okay</option>
                <option value="stressed">Stressed</option>
              </select>
            </div>

            <div>
              <label for="goal" style="display:block;font-weight:700;margin-bottom:0.3rem;">Goal</label>
              <select id="goal" class="ay-select">
                <option value="energy">Energy</option>
                <option value="pain">Pain Relief</option>
                <option value="relief">Stress Relief</option>
                <option value="focus">Focus</option>
                <option value="digestion">Digestion</option>
                <option value="sleep">Sleep</option>
              </select>
            </div>
          </div>

          <button type="submit" class="ay-btn" style="margin-top:0.8rem;">Recommend Yoga Videos</button>
        </form>
        <p id="recommendationResult" style="margin:0.8rem 0 0;font-weight:700;color:#2e6a4f;"></p>
      </section>

      <section class="ay-panel ay-glass ay-reveal" style="margin-top:1rem;">
        <div id="videoContainer" class="ay-grid-2"></div>
      </section>
    </main>
  </div>

  <script src="ayu-theme.js"></script>
  <script src="yoga.js"></script>
</body>
</html>
