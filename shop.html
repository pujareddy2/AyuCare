<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AyuCare Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ayu-theme.css" />
</head>
<body class="ay-body">
  <div class="ay-bg-blur" aria-hidden="true"></div>
  <div class="ay-wrap">
    <header class="ay-topbar ay-glass">
      <div class="ay-brand">AyuCare</div>
      <nav class="ay-nav">
        <a href="index.html">Home</a>
        <a href="food.html">Recommendations</a>
        <a href="foodtracker.html">Diet Tracker</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart</a>
      </nav>
    </header>

    <section class="ay-hero ay-glass ay-reveal">
      <div>
        <h1>Ayurvedic Apothecary Store</h1>
        <p class="ay-sub">Herbs, oils, teas, and wellness nutrition selected for holistic care.</p>
        <div style="margin-top:0.8rem;display:flex;gap:0.6rem;flex-wrap:wrap;">
          <a class="ay-btn alt" href="cart.html">View Cart</a>
          <span class="ay-btn" style="cursor:default;">Items in Cart: <span id="cartCount" style="margin-left:0.4rem;">0</span></span>
        </div>
      </div>

      <div class="ay-ring ay-spin">
        <img src="Brahmi.jpeg" alt="Brahmi" />
        <img src="AmlaP.PNG" alt="Amla" />
        <img src="NeemP.PNG" alt="Neem" />
        <img src="TulsiP.PNG" alt="Tulsi" />
        <img src="GingerT.PNG" alt="Ginger tea" />
        <div class="ay-ring-inner">Wellness<br />Store</div>
      </div>
    </section>

    <section class="ay-panel ay-glass ay-device-stage ay-reveal">
      <div class="ay-device-scene">
        <div class="ay-device-shell">
          <div class="ay-device-glow"></div>
          <img class="ay-device-media" src="Chyawa.PNG" alt="Ayurvedic product screen" />
        </div>
        <span class="ay-orbit-tag tag-1">Herb Grid</span>
        <span class="ay-orbit-tag tag-2">Live Cart</span>
        <span class="ay-orbit-tag tag-3">Smart Filter</span>
      </div>
    </section>

    <main class="ay-content ay-reveal">
      <section class="ay-panel ay-glass">
        <div class="ay-grid-2">
          <input id="searchInput" type="text" placeholder="Search products..." class="ay-search" oninput="searchProducts()" />
          <select id="categoryFilter" onchange="filterProducts()" class="ay-select">
            <option value="all">All Categories</option>
            <option value="herbs">Herbs</option>
            <option value="oils">Oils</option>
            <option value="food">Health Foods</option>
            <option value="tea">Teas</option>
          </select>
        </div>

        <div id="productContainer" class="ay-grid-3 ay-interact" style="margin-top:1rem;"></div>
      </section>
    </main>

    <div id="cartMessage" style="position:fixed;right:1rem;bottom:1rem;background:#d5ead7;color:#204b38;padding:0.7rem 1rem;border-radius:0.8rem;display:none;box-shadow:var(--ay-shadow);z-index:30;">
      Item added to cart!
    </div>
  </div>

  <script src="ayu-theme.js"></script>
  <script src="shop.js"></script>
</body>
</html>
