<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation - AyuCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ayu-theme.css" />
</head>
<body class="ay-body">
  <div class="ay-bg-blur" aria-hidden="true"></div>
  <div class="ay-wrap">
    <header class="ay-topbar ay-glass">
      <div class="ay-brand">AyuCare</div>
      <nav class="ay-nav">
        <a href="index.html">Home</a>
        <a href="meditation.html">Meditation</a>
        <a href="yoga.html">Yoga</a>
        <a href="exercise.html">Exercise</a>
      </nav>
    </header>

    <section class="ay-hero ay-glass ay-reveal">
      <div>
        <h1>Meditation and Breath Studio</h1>
        <p class="ay-sub">Guided calm sessions, category filters, and a paced breathing cycle.</p>
      </div>
      <div class="ay-ring ay-spin">
        <img src="TulsiT.PNG" alt="Tulsi tea" />
        <img src="GingerT.PNG" alt="Ginger tea" />
        <img src="AmlaP.PNG" alt="Amla" />
        <img src="Brahmi.jpeg" alt="Brahmi" />
        <img src="NeemP.PNG" alt="Neem" />
        <div class="ay-ring-inner">Breathe<br />and Reset</div>
      </div>
    </section>

    <main class="ay-content">
      <section class="ay-panel ay-glass ay-reveal">
        <div style="display:flex;gap:0.6rem;flex-wrap:wrap;">
          <button onclick="filterMeditation('all')" class="ay-btn alt">All</button>
          <button onclick="filterMeditation('sleep')" class="ay-btn alt">Sleep</button>
          <button onclick="filterMeditation('focus')" class="ay-btn alt">Focus</button>
          <button onclick="filterMeditation('anxiety')" class="ay-btn alt">Anxiety</button>
        </div>
      </section>

      <section class="ay-panel ay-glass ay-reveal" style="margin-top:1rem;">
        <h2 style="margin-top:0;font-family:'Cinzel',serif;">Meditation Picks</h2>
        <div id="meditationContainer" class="ay-grid-2"></div>
      </section>

      <section class="ay-panel ay-glass ay-reveal" style="margin-top:1rem;text-align:center;">
        <h2 style="margin-top:0;font-family:'Cinzel',serif;">Breathing Exercise</h2>
        <div id="phase-label" style="font-size:1.35rem;font-weight:700;color:#2e6a4f;">Ready</div>
        <div id="countdown" style="font-size:4rem;font-weight:700;line-height:1.1;">3</div>
        <div style="margin-top:0.8rem;display:flex;justify-content:center;gap:0.6rem;flex-wrap:wrap;">
          <button id="start-breathing" class="ay-btn">Start Breathing</button>
          <button id="stop-breathing" class="ay-btn alt">Stop</button>
        </div>
      </section>

      <section class="ay-panel ay-glass ay-reveal" style="margin-top:1rem;">
        <h2 style="margin-top:0;font-family:'Cinzel',serif;">Guided Meditation Videos</h2>
        <div id="videoContainer" class="ay-grid-3"></div>
      </section>
    </main>
  </div>

  <script src="ayu-theme.js"></script>
  <script src="meditation.js"></script>
</body>
</html>
